<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - Ruang Teman UNSOED</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <!-- ================= FONT ================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,400&family=Itim&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="text-[#3A3A3A] min-h-screen flex flex-col relative" style="font-family: 'Inria Sans', sans-serif; background: linear-gradient(135deg, #EBF4FA 0%, #FFFFFF 50%, #FFF8ED 100%);">

  <!-- Tombol Kembali di Pojok Kiri Atas -->
  <a href="index.html" class="absolute top-8 left-8 flex items-center gap-2 text-[#6B6B6B] hover:text-[#7CC6F2] transition-colors font-medium z-10 animate-fade-up is-visible">
    <i class="fa-solid fa-arrow-left"></i> Kembali
  </a>

  <main class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-on-scroll opacity-0 translate-y-10 transition-all duration-700 ease-out is-visible" style="animation: fadeUp 0.6s ease-out forwards;">
      
      <!-- Header Logo & Judul -->
      <div class="text-center mb-8">
        <div class="inline-flex justify-center items-center mb-4">
          <svg class="w-16 h-16" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 100C60 100 25 75 25 50C25 35 35 25 50 25C55 25 60 27 60 27C60 27 65 25 70 25C85 25 95 35 95 50C95 75 60 100 60 100Z" fill="#A7D8F5" stroke="#7CC6F2" stroke-width="2" />
            <path d="M50 95L45 110L55 98Z" fill="#A7D8F5" stroke="#7CC6F2" stroke-width="2" stroke-linejoin="round" />
            <circle cx="45" cy="50" r="8" fill="#7CC6F2" />
            <path d="M45 58C40 58 36 62 36 67L36 75C36 76 37 77 38 77L52 77C53 77 54 76 54 75L54 67C54 62 50 58 45 58Z" fill="#7CC6F2" />
            <circle cx="75" cy="50" r="8" fill="#7CC6F2" />
            <path d="M75 58C70 58 66 62 66 67L66 75C66 76 67 77 68 77L82 77C83 77 84 76 84 75L84 67C84 62 80 58 75 58Z" fill="#7CC6F2" />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-[#3A3A3A] mb-2" style="font-family: 'Itim', cursive;">Ruang Teman Unsoed</h1>
        <p class="text-sm text-[#6B6B6B]">Teman Bertanya, Berbagi, dan Bertumbuh Bersama</p>
      </div>

      <!-- Kotak Form Login -->
      <div class="bg-white rounded-[2rem] p-8 shadow-xl border border-[#A7D8F5]/20 relative overflow-hidden">
        
        <!-- Pesan Error (Sembunyi by default) -->
        <div id="error-message" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm text-center font-medium">
          Gunakan email dengan domain @mhs.unsoed.ac.id
        </div>

        <form id="login-form" class="space-y-5">
          <!-- Input Email -->
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-[#6B6B6B] block">Email Mahasiswa Unsoed</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fa-regular fa-envelope text-[#6B6B6B]"></i>
              </div>
              <input 
                type="email" 
                id="email"
                placeholder="nama.anda@mhs.unsoed.ac.id" 
                required
                pattern=".+@mhs\.unsoed\.ac\.id$"
                title="Wajib menggunakan email @mhs.unsoed.ac.id"
                class="w-full pl-11 pr-4 py-3 rounded-2xl border-2 border-[#A7D8F5]/30 focus:border-[#7CC6F2] focus:outline-none focus:ring-4 focus:ring-[#7CC6F2]/10 transition-all text-[#3A3A3A]"
              >
            </div>
          </div>

          <!-- Input Password -->
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-[#6B6B6B] block">Password</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fa-solid fa-lock text-[#6B6B6B]"></i>
              </div>
              <input 
                type="password" 
                id="password"
                placeholder="Masukkan password" 
                required
                class="w-full pl-11 pr-4 py-3 rounded-2xl border-2 border-[#A7D8F5]/30 focus:border-[#7CC6F2] focus:outline-none focus:ring-4 focus:ring-[#7CC6F2]/10 transition-all text-[#3A3A3A]"
              >
            </div>
          </div>

          <!-- Lupa Password Link -->
          <div class="flex justify-end">
            <a href="#" class="text-xs font-medium text-[#7CC6F2] hover:underline">Lupa password?</a>
          </div>

          <!-- Tombol Masuk -->
          <button type="submit" class="w-full py-3.5 bg-[#7CC6F2] text-white rounded-2xl font-bold text-lg hover:bg-[#7CC6F2]/90 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300">
            Masuk
          </button>
        </form>

        <div class="mt-6 mb-6 flex items-center justify-center">
          <div class="h-px bg-[#A7D8F5]/30 flex-grow"></div>
          <span class="px-4 text-xs text-[#6B6B6B] font-medium uppercase tracking-wider">ATAU</span>
          <div class="h-px bg-[#A7D8F5]/30 flex-grow"></div>
        </div>

        <!-- Tombol Google Login -->
        <button type="button" onclick="simulateGoogleLogin()" class="w-full py-3 bg-white border-2 border-gray-200 text-[#3A3A3A] rounded-2xl font-medium text-sm flex items-center justify-center gap-3 hover:bg-gray-50 hover:border-gray-300 transition-all">
          <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Lanjutkan dengan Google
        </button>

      </div>

      <!-- Link Bantuan Bawah -->
      <div class="mt-8 text-center">
        <p class="text-sm text-[#6B6B6B]">
          Belum punya akun? <a href="#" class="font-bold text-[#7CC6F2] hover:underline">Hubungi Admin</a>
        </p>
      </div>

    </div>
  </main>

  <!-- ================= SIMULASI POP-UP GOOGLE ================= -->
  <div id="google-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300 p-6 text-center" id="google-content">
      <div class="flex justify-center mb-4">
        <svg class="w-12 h-12" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      </div>
      <h3 class="text-lg font-bold text-[#3A3A3A] mb-2">Pilih Akun Unsoed Anda</h3>
      <p class="text-sm text-[#6B6B6B] mb-6">Untuk melanjutkan ke Ruang Teman Unsoed</p>
      
      <button onclick="loginSuccess()" class="w-full text-left flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl border border-gray-100 transition-colors mb-3">
        <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">H</div>
        <div>
          <p class="text-sm font-bold text-[#3A3A3A]">Hanifah Silmi Fajri</p>
          <p class="text-xs text-[#6B6B6B]">hanifah.fajri@mhs.unsoed.ac.id</p>
        </div>
      </button>

      <button onclick="closeGoogleModal()" class="text-sm font-medium text-[#6B6B6B] hover:text-red-500 mt-2">Batal</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const errorMsg = document.getElementById('error-message');
    const googleModal = document.getElementById('google-modal');
    const googleContent = document.getElementById('google-content');

    // 1. Validasi saat tombol Masuk (Form) diklik
    form.addEventListener('submit', (e) => {
      e.preventDefault(); // Mencegah reload halaman
      const email = emailInput.value;

      // Pengecekan ketat dengan JavaScript
      if (email.endsWith('@mhs.unsoed.ac.id')) {
        errorMsg.classList.add('hidden');
        loginSuccess();
      } else {
        errorMsg.classList.remove('hidden');
        // Efek goyang (shake) pada input biar interaktif
        emailInput.classList.add('animate-bounce');
        setTimeout(() => emailInput.classList.remove('animate-bounce'), 500);
      }
    });

    // 2. Fungsi Simulasi Buka Modal Google
    function simulateGoogleLogin() {
      googleModal.classList.remove('hidden');
      setTimeout(() => {
        googleModal.classList.remove('opacity-0');
        googleContent.classList.remove('scale-95');
      }, 10);
    }

    // 3. Fungsi Tutup Modal Google
    function closeGoogleModal() {
      googleModal.classList.add('opacity-0');
      googleContent.classList.add('scale-95');
      setTimeout(() => { googleModal.classList.add('hidden'); }, 300);
    }

// Simulasi Redirect & Simpan Sesi
    function loginSuccess(btnElement) {
      // 1. Simpan status login ke memori browser
      localStorage.setItem("isLoggedIn", "true");
      
      // Ambil email yang diketik (jika lewat form), atau pakai default jika lewat Google
      const typedEmail = document.getElementById('email').value || "hanifah.fajri@mhs.unsoed.ac.id";
      localStorage.setItem("userEmail", typedEmail);

      // 2. Efek Loading
      if(!btnElement) btnElement = document.querySelector('#google-content button');
      btnElement.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Memuat...`;
      btnElement.classList.add('opacity-80', 'cursor-not-allowed');
      
      // 3. Pindah ke Dashboard
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
    }
  </script>

</body>
</html>
